server {
    listen 80;
    server_name _;

    # Resolve o hostname 'app' dinamicamente via DNS interno do Docker.
    # Sem isso, nginx falha ao iniciar se o container app ainda não estiver up.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ── WhatsTrigger (Laravel) em /whatstrigger ──────────────────────────────
    # Em produção, este bloco convive com as rotas da LandPage existente.
    # Todas as requisições a /whatstrigger/* são despachadas para o PHP-FPM.

    root /var/www/html/public;
    index index.php;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        set $php_upstream app:9000;
        fastcgi_pass $php_upstream;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
    }

    # Assets estáticos: cache no browser por 30 dias, sem bater no PHP
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Limitar taxa de requisições no subsistema para não sobrecarregar o servidor
    # (descomentar e ajustar após configurar `limit_req_zone` no nginx.conf global)
    # limit_req zone=whatstrigger burst=20 nodelay;

    client_max_body_size 10M;

    gzip on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_vary on;
}
