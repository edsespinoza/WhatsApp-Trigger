; PHP-FPM pool — configuração de workers para a aplicação Laravel
[www]
user  = www-data
group = www-data

listen = 9000

; dynamic: sobe/desce workers conforme demanda
pm = dynamic

; máximo de workers simultâneos (~40MB cada, ~3GB disponível no host)
pm.max_children = 20

; workers iniciados junto com o FPM
pm.start_servers = 5

; mínimo/máximo de workers ociosos aguardando requests
pm.min_spare_servers = 3
pm.max_spare_servers = 10

; recicla worker após N requests — evita vazamento de memória ao longo do tempo
pm.max_requests = 500

; log de requests lentos (acima de 5s aparecem no log do container)
slowlog = /proc/self/fd/2
request_slowlog_timeout = 5s
